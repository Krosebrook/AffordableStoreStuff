<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Style DNA Social Share Card</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300;0,400;0,600;0,700;1,400&amp;family=Noto+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7317cf",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191121",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    backgroundImage: {
                        'moody-gradient': 'linear-gradient(135deg, #1a1a1a 0%, #0f172a 100%)',
                        'neon-glow': 'radial-gradient(circle at center, rgba(115, 23, 207, 0.15) 0%, transparent 70%)',
                    }
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .neon-stroke {
            filter: drop-shadow(0 0 4px #7317cf) drop-shadow(0 0 8px rgba(115, 23, 207, 0.5));
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col antialiased selection:bg-primary selection:text-white">
<!-- Top App Bar -->
<header class="flex items-center bg-transparent absolute top-0 left-0 right-0 z-50 p-4 pb-2 justify-between">
<button class="text-white flex size-12 shrink-0 items-center justify-center hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-white text-sm font-bold uppercase tracking-widest flex-1 text-center opacity-80">Share Analysis</h2>
<div class="flex w-12 items-center justify-end">
<!-- Placeholder for balance -->
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Ambient Effects -->
<div class="absolute inset-0 bg-moody-gradient z-0"></div>
<div class="absolute top-1/4 -left-20 w-80 h-80 bg-primary/20 rounded-full blur-[100px] z-0 pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-blue-900/20 rounded-full blur-[100px] z-0 pointer-events-none"></div>
<!-- The Share Card (Square Aspect Ratio) -->
<div class="relative z-10 w-full max-w-sm aspect-[4/5] glass-panel rounded-2xl p-6 flex flex-col justify-between overflow-hidden group" id="share-card">
<!-- Decorative corner accents -->
<div class="absolute top-4 left-4 size-2 border-t border-l border-white/40"></div>
<div class="absolute top-4 right-4 size-2 border-t border-r border-white/40"></div>
<div class="absolute bottom-4 left-4 size-2 border-b border-l border-white/40"></div>
<div class="absolute bottom-4 right-4 size-2 border-b border-r border-white/40"></div>
<!-- Card Header -->
<div class="text-center space-y-1 mt-2">
<p class="text-xs font-bold tracking-[0.2em] text-gray-400 uppercase">Style DNA Analysis</p>
<h3 class="text-lg text-white font-medium">Alex Doe</h3>
</div>
<!-- Main Archetype & Chart -->
<div class="flex-1 flex flex-col items-center justify-center py-4 space-y-4">
<h1 class="text-4xl text-center font-bold text-white italic tracking-wide neon-text">
                    Urban<br/>Minimalist
                </h1>
<div class="relative size-48 flex items-center justify-center">
<!-- Radar Chart SVG -->
<svg class="w-full h-full drop-shadow-lg" viewbox="0 0 200 200">
<!-- Grid Lines (Pentagon) -->
<polygon fill="none" points="100,20 176,76 147,164 53,164 24,76" stroke="rgba(255,255,255,0.1)" stroke-width="1"></polygon>
<polygon fill="none" points="100,40 157,82 135,148 65,148 43,82" stroke="rgba(255,255,255,0.1)" stroke-width="1"></polygon>
<polygon fill="none" points="100,60 138,88 123,132 77,132 62,88" stroke="rgba(255,255,255,0.1)" stroke-width="1"></polygon>
<!-- Axis Lines -->
<line stroke="rgba(255,255,255,0.05)" stroke-width="1" x1="100" x2="100" y1="100" y2="20"></line>
<line stroke="rgba(255,255,255,0.05)" stroke-width="1" x1="100" x2="176" y1="100" y2="76"></line>
<line stroke="rgba(255,255,255,0.05)" stroke-width="1" x1="100" x2="147" y1="100" y2="164"></line>
<line stroke="rgba(255,255,255,0.05)" stroke-width="1" x1="100" x2="53" y1="100" y2="164"></line>
<line stroke="rgba(255,255,255,0.05)" stroke-width="1" x1="100" x2="24" y1="100" y2="76"></line>
<!-- Data Polygon (The "Neon" part) -->
<polygon class="neon-stroke" fill="rgba(115, 23, 207, 0.2)" points="100,25 165,76 120,150 70,140 35,76" stroke="#7317cf" stroke-width="2.5">
</polygon>
<!-- Data Points -->
<circle class="shadow-sm" cx="100" cy="25" fill="#fff" r="3"></circle>
<circle class="shadow-sm" cx="165" cy="76" fill="#fff" r="3"></circle>
<circle class="shadow-sm" cx="120" cy="150" fill="#fff" r="3"></circle>
<circle class="shadow-sm" cx="70" cy="140" fill="#fff" r="3"></circle>
<circle class="shadow-sm" cx="35" cy="76" fill="#fff" r="3"></circle>
</svg>
<!-- Labels -->
<span class="absolute top-0 text-[10px] uppercase tracking-wider text-primary font-bold">Bold</span>
<span class="absolute right-0 top-[35%] text-[10px] uppercase tracking-wider text-gray-400">Color</span>
<span class="absolute right-4 bottom-[15%] text-[10px] uppercase tracking-wider text-gray-400">Form</span>
<span class="absolute left-4 bottom-[15%] text-[10px] uppercase tracking-wider text-gray-400">Vol</span>
<span class="absolute left-0 top-[35%] text-[10px] uppercase tracking-wider text-gray-400">Tex</span>
</div>
</div>
<!-- Signature Palette -->
<div class="mb-6">
<p class="text-xs text-center text-gray-400 uppercase tracking-wider mb-3">Signature Palette</p>
<div class="flex justify-center gap-3">
<div class="size-8 rounded-full border border-white/20 shadow-lg" style="background-color: #1a1a1a;"></div>
<div class="size-8 rounded-full border border-white/20 shadow-lg" style="background-color: #2D3748;"></div>
<div class="size-8 rounded-full border border-white/20 shadow-lg" style="background-color: #718096;"></div>
<div class="size-8 rounded-full border border-white/20 shadow-lg" style="background-color: #CBD5E0;"></div>
<div class="size-8 rounded-full border border-white/20 shadow-lg" style="background-color: #F7FAFC;"></div>
</div>
</div>
<!-- Footer: Logo & QR -->
<div class="flex items-center justify-between border-t border-white/10 pt-4 mt-2">
<div class="flex items-center gap-2">
<div class="size-8 bg-white text-black rounded-lg flex items-center justify-center font-bold font-display text-xl">S</div>
<div>
<p class="text-sm font-bold text-white leading-none">StyleDNA</p>
<p class="text-[10px] text-gray-400 leading-none mt-0.5">AI Stylist</p>
</div>
</div>
<div class="bg-white p-1 rounded-sm">
<!-- Abstract QR code pattern -->
<div class="grid grid-cols-4 grid-rows-4 gap-0.5 size-8">
<div class="bg-black col-span-2 row-span-2"></div>
<div class="bg-black"></div>
<div class="bg-black"></div>
<div class="bg-black"></div>
<div class="bg-black"></div>
<div class="bg-black col-span-2 row-span-2 col-start-3 row-start-3"></div>
<div class="bg-black row-start-3"></div>
<div class="bg-black row-start-3"></div>
<div class="bg-black row-start-4"></div>
<div class="bg-black row-start-4"></div>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="bg-background-dark/80 backdrop-blur-xl border-t border-white/5 p-6 pb-8 z-50">
<div class="flex gap-4 max-w-sm mx-auto">
<button class="flex-1 bg-white/5 hover:bg-white/10 text-white font-sans font-medium py-3.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 border border-white/10">
<span class="material-symbols-outlined text-[20px]">download</span>
                Save
            </button>
<button class="flex-[2] bg-primary hover:bg-primary/90 text-white font-sans font-bold py-3.5 px-4 rounded-xl shadow-[0_0_20px_rgba(115,23,207,0.4)] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">ios_share</span>
                Share Image
            </button>
</div>
</footer>
</body></html>
