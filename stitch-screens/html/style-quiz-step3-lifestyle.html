<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Style Quiz - Lifestyle &amp; Occasions</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1717cf",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0a14",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .chip-active {
            background-color: #1717cf;
            border-color: #1717cf;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Top Navigation -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-sm font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Step 3 of 3</h2>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pt-2 pb-32">
<!-- Progress Bar Section -->
<div class="mb-10">
<div class="flex justify-between items-end mb-3">
<span class="text-xs font-bold text-primary uppercase tracking-tighter">Completion</span>
<span class="text-3xl font-extrabold leading-none tracking-tighter text-slate-900 dark:text-slate-100">100%</span>
</div>
<div class="h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-full rounded-full shadow-[0_0_15px_rgba(23,23,207,0.5)]"></div>
</div>
</div>
<!-- Hero Section -->
<div class="mb-8">
<span class="inline-block px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest mb-4">Final Step</span>
<h1 class="text-[34px] font-extrabold leading-[1.1] tracking-tight mb-4 text-slate-900 dark:text-white">
                What occasions do you dress for most?
            </h1>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                Select your lifestyle needs so your AI stylist can curate the perfect wardrobe for every moment.
            </p>
</div>
<!-- Multi-select Chips Grid -->
<div class="flex flex-wrap gap-3 mb-10">
<!-- Work/Office -->
<button class="flex items-center gap-2 px-5 py-3 rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">work</span>
<span class="text-sm font-semibold">Work/Office</span>
</button>
<!-- Casual Outings (Active State Example) -->
<button class="flex items-center gap-2 px-5 py-3 rounded-full border border-primary bg-primary text-white transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white">coffee</span>
<span class="text-sm font-semibold">Casual Outings</span>
</button>
<!-- Evening/Gala -->
<button class="flex items-center gap-2 px-5 py-3 rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">liquor</span>
<span class="text-sm font-semibold">Evening/Gala</span>
</button>
<!-- Gym/Athleisure (Active State Example) -->
<button class="flex items-center gap-2 px-5 py-3 rounded-full border border-primary bg-primary text-white transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white">fitness_center</span>
<span class="text-sm font-semibold">Gym/Athleisure</span>
</button>
<!-- Date Night -->
<button class="flex items-center gap-2 px-5 py-3 rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">favorite</span>
<span class="text-sm font-semibold">Date Night</span>
</button>
<!-- Travel -->
<button class="flex items-center gap-2 px-5 py-3 rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">flight</span>
<span class="text-sm font-semibold">Travel</span>
</button>
<!-- Special Events -->
<button class="flex items-center gap-2 px-5 py-3 rounded-full border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">celebration</span>
<span class="text-sm font-semibold">Special Events</span>
</button>
</div>
<!-- Lifestyle Image Preview -->
<div class="relative w-full h-48 rounded-2xl overflow-hidden mb-6 group">
<img alt="High-end fashion editorial" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" data-alt="Editorial fashion photography showing modern luxury outfits" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAingKEx3HGzWX0CqyDEiI1vdUrCCjSmK82t3yyru_6tVh4EcQKi1QcUg63c-W9OHy9WnaxcWa77sVNqGwZdW4qbYN6-36rjzYWrQfx-5MwMMr79V09RAJUN0aE7L3aJPd2m2VNrVxrEvkv_9P6AxBkLLoYW_rpKXPU2ECi5v4MJrvWgpO7K3DKcClxkA3XyrVaNRQ4sHX1MtEaOesIn58GVlIE9vB29dF45CTY6zystaWv0ywzkrdAr2RxCtgAsjvNxoaARToFc4_2"/>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4">
<p class="text-white text-xs font-medium uppercase tracking-widest opacity-80">AI Analysis Ready</p>
<p class="text-white font-bold">Curating your unique vibe...</p>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent">
<button class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-5 rounded-full flex items-center justify-center gap-3 shadow-2xl shadow-primary/40 active:scale-[0.98] transition-all">
<span>Generate My Style Profile</span>
<span class="material-symbols-outlined">auto_awesome</span>
</button>
<p class="text-center mt-4 text-[10px] text-slate-500 dark:text-slate-500 uppercase tracking-[0.2em] font-medium">
            Personalized results in 5 seconds
        </p>
</div>
</body></html>
