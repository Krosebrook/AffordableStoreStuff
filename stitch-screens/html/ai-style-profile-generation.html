<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Style Profile Generation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1919e6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0a14",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
        .animate-rotate-slow { animation: rotate-slow 12s linear infinite; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        .orb-gradient {
            background: radial-gradient(circle at center, #1919e6 0%, rgba(25, 25, 230, 0.4) 40%, transparent 70%);
        }
        .neural-line {
            background: linear-gradient(90deg, transparent, rgba(25, 25, 230, 0.2), transparent);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<!-- Main iOS Container -->
<div class="relative flex h-screen w-full flex-col justify-between overflow-hidden px-6 pt-12 pb-8">
<!-- Top Status Bar Mock (iOS Style) -->
<div class="flex justify-between items-center w-full px-4 absolute top-4 left-0 right-0">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Header / Close -->
<div class="flex items-center justify-between z-10">
<button class="size-10 flex items-center justify-center rounded-full bg-slate-800/20 backdrop-blur-md border border-slate-700/30">
<span class="material-symbols-outlined text-slate-400">close</span>
</button>
<div class="px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 backdrop-blur-md">
<span class="text-primary text-xs font-bold uppercase tracking-widest">AI Engine Active</span>
</div>
<div class="size-10"></div> <!-- Spacer -->
</div>
<!-- Central AI Visualization Area -->
<div class="flex-1 flex flex-col items-center justify-center relative">
<!-- Background Decorative Gradients -->
<div class="absolute inset-0 orb-gradient opacity-20 scale-150 blur-3xl"></div>
<!-- Orbital Rings -->
<div class="absolute size-80 rounded-full border border-primary/10 animate-rotate-slow"></div>
<div class="absolute size-64 rounded-full border border-primary/20 animate-rotate-slow" style="animation-direction: reverse; animation-duration: 8s;"></div>
<!-- Progress Ring (Simulated 85%) -->
<div class="absolute size-[320px] flex items-center justify-center">
<svg class="size-full transform -rotate-90">
<circle class="text-slate-800/30" cx="160" cy="160" fill="transparent" r="150" stroke="currentColor" stroke-width="2"></circle>
<circle class="text-primary transition-all duration-1000" cx="160" cy="160" fill="transparent" r="150" stroke="currentColor" stroke-dasharray="942" stroke-dashoffset="141" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
<!-- Central AI Orb Core -->
<div class="relative size-48 flex items-center justify-center animate-float">
<!-- Glowing Aura -->
<div class="absolute inset-0 rounded-full bg-primary blur-2xl opacity-40 animate-pulse-glow"></div>
<!-- Inner Core -->
<div class="relative size-40 rounded-full bg-gradient-to-br from-primary to-blue-900 shadow-[0_0_50px_rgba(25,25,230,0.5)] flex flex-col items-center justify-center border border-white/10">
<span class="text-4xl font-bold tracking-tighter">85<span class="text-lg opacity-60">%</span></span>
<span class="text-[10px] uppercase font-bold tracking-[0.2em] mt-1 opacity-70">Computing</span>
</div>
<!-- Floating Particles/Nodes -->
<div class="absolute -top-4 -right-2 size-3 rounded-full bg-primary shadow-[0_0_10px_#1919e6]"></div>
<div class="absolute bottom-6 -left-4 size-2 rounded-full bg-blue-400 shadow-[0_0_8px_#60a5fa]"></div>
</div>
</div>
<!-- Textual Feedback Section -->
<div class="relative z-10 flex flex-col items-center text-center space-y-4 mb-12">
<div class="space-y-2">
<h2 class="text-2xl font-bold tracking-tight text-slate-100">
                    Analyzing your fashion DNA...
                </h2>
<div class="flex items-center justify-center gap-2">
<div class="flex space-x-1">
<span class="size-1 rounded-full bg-primary animate-bounce"></span>
<span class="size-1 rounded-full bg-primary animate-bounce" style="animation-delay: 0.2s"></span>
<span class="size-1 rounded-full bg-primary animate-bounce" style="animation-delay: 0.4s"></span>
</div>
<p class="text-slate-400 text-sm font-medium">Matching aesthetics...</p>
</div>
</div>
<!-- Contextual Insight Card -->
<div class="w-full max-w-xs p-4 rounded-xl bg-slate-900/40 backdrop-blur-xl border border-white/5 flex items-center gap-4">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">temp_preferences_custom</span>
</div>
<div class="text-left">
<p class="text-[10px] uppercase font-bold text-primary tracking-wider">Current Step</p>
<p class="text-sm text-slate-300">Checking local weather trends in New York...</p>
</div>
</div>
</div>
<!-- Bottom Navigation Mock -->
<div class="relative flex h-auto w-full flex-col bg-transparent">
<div class="flex gap-2 border-t border-white/5 px-4 pb-4 pt-4">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 opacity-30 pointer-events-none" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-xs font-medium">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 opacity-30 pointer-events-none" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">styler</span>
</div>
<p class="text-xs font-medium">Closet</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">auto_fix_high</span>
</div>
<p class="text-xs font-medium">Stylist</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 opacity-30 pointer-events-none" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium">Profile</p>
</a>
</div>
<!-- iOS Home Indicator -->
<div class="w-32 h-1 bg-slate-700/50 rounded-full mx-auto mb-2 mt-2"></div>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<!-- Grid pattern -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 30px 30px;"></div>
<!-- Animated Neural Network Lines (Static Mockup) -->
<div class="absolute top-[20%] left-0 w-full h-[1px] neural-line transform rotate-12"></div>
<div class="absolute top-[40%] left-0 w-full h-[1px] neural-line transform -rotate-12"></div>
<div class="absolute top-[60%] left-0 w-full h-[1px] neural-line transform rotate-6"></div>
<div class="absolute top-[80%] left-0 w-full h-[1px] neural-line transform -rotate-3"></div>
</div>
</body></html>
